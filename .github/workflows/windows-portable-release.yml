name: Windows Portable Release

on:
  workflow_dispatch:

jobs:
  windows-portable:
    runs-on: windows-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: OFF
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: ilammy/setup-nasm@v1

    - name: Setup environment
      shell: cmd
      run: |
        echo %CD%\install-Release\bin>> %GITHUB_PATH%
        echo %CD%\install-Release\lib>> %GITHUB_PATH%
        cmake --version
        python --version
        where nasm

    - name: Super Build
      shell: cmd
      run: |
        djv\etc\Windows\windows-sbuild.bat djv Release

    - name: Build portable ZIP
      shell: cmd
      run: |
        djv\etc\Windows\windows-portable-package.bat djv Release

    - name: Verify packaged local changes
      shell: pwsh
      run: |
        $zip = Get-ChildItem "build-Release\djv-*-windows-*.zip" | Select-Object -First 1
        if (-not $zip) {
          throw "Portable ZIP was not generated."
        }
        $verifyDir = Join-Path $env:RUNNER_TEMP "djv-package-verify"
        Remove-Item -Recurse -Force $verifyDir -ErrorAction SilentlyContinue
        Expand-Archive -Path $zip.FullName -DestinationPath $verifyDir -Force
        $exe = Get-ChildItem $verifyDir -Recurse -Filter "djv.exe" | Select-Object -First 1
        if (-not $exe) {
          throw "djv.exe was not found in the portable ZIP."
        }
        $text = [System.Text.Encoding]::UTF8.GetString([System.IO.File]::ReadAllBytes($exe.FullName))
        $requiredStrings = @(
          "未加载 A 视频",
          "打开 A 视频",
          "请选择 B 视频",
          "DJV_SMOKE_DUAL_TOTAL_EXIT"
        )
        foreach ($value in $requiredStrings) {
          if (-not $text.Contains($value)) {
            throw "Packaged djv.exe is missing expected local change marker: $value"
          }
        }
        Write-Host "Verified packaged local changes in $($exe.FullName)"

    - uses: actions/upload-artifact@v4
      with:
        name: DJV-Windows-Portable-x64
        path: build-Release/djv-*-windows-*.zip
        if-no-files-found: error
