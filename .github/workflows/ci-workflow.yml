name: CI

on: [push]

jobs:
  linux-build:
    runs-on: ubuntu-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Debug/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Super Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Debug

    - name: Build DJV
      run: |
        sh djv/etc/Linux/linux-build.sh djv Debug

  # \bug Disable building OIIO; it seems there is an error when OCIO is disabled.
  linux-gles2-build:
    runs-on: ubuntu-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: OFF
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: OFF
      TLRENDER_FFMPEG_MINIMAL: OFF
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: OFF
      TLRENDER_USD: OFF
      FTK_API: GLES_2

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Debug/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Super Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Debug

    - name: Build DJV
      run: |
        sh djv/etc/Linux/linux-build.sh djv Debug

  linux-package:
    runs-on: ubuntu-22.04

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup environment
      run: |
        echo "$PWD/install-Release/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$PWD/install-Release/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Release/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version
        python --version
        sh djv/etc/Linux/linux-setup-gha.sh

    - name: Super Build
      run: |
        sh djv/etc/Linux/linux-sbuild.sh djv Release

    - name: Build and package DJV
      run: |
        sh djv/etc/Linux/linux-package.sh djv Release

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-Linux-Packages
        path: build-Release/djv-*.tar.gz
        archive: false

  macos-build:
    runs-on: macos-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF
      CMAKE_OSX_DEPLOYMENT_TARGET: 14
      CMAKE_OSX_ARCHITECTURES: arm64

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # \bug DYLD_LIBRARY_PATH is not being set here?
    - name: Setup environment
      run: |
        echo "$PWD/install-Debug/bin" >> $GITHUB_PATH
        echo "DYLD_LIBRARY_PATH=$PWD/install-Debug/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Debug/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version

    - name: Super Build
      run: |
        export DYLD_LIBRARY_PATH=$PWD/install-Debug/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-sbuild.sh djv Debug

    - name: Build DJV
      run: |
        export DYLD_LIBRARY_PATH=$PWD/install-Debug/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-build.sh djv Debug

  macos-package:
    runs-on: macos-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: ON
      TLRENDER_SVTAV1: ON
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: OFF
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: ON
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF
      CMAKE_OSX_DEPLOYMENT_TARGET: 10.15
      CMAKE_OSX_ARCHITECTURES: arm64

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # \bug DYLD_LIBRARY_PATH is not being set here?
    - name: Setup environment
      run: |
        echo "$PWD/install-Release/bin" >> $GITHUB_PATH
        echo "DYLD_LIBRARY_PATH=$PWD/install-Release/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=$PWD/install-Release/lib:$PYTHONPATH" >> $GITHUB_ENV
        cmake --version
        python --version

    - name: Super Build
      run: |
        export DYLD_LIBRARY_PATH=$PWD/install-Release/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-sbuild.sh djv Release

    # \bug Sometimes the CI runs out of disk space when building the macOS
    # package, so free some up by removing the super build directory.
    - name: Package
      run: |
        rm -rf sbuild-Release
        export DYLD_LIBRARY_PATH=$PWD/install-Release/lib:$DYLD_LIBRARY_PATH
        sh djv/etc/macOS/macos-package.sh djv Release

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-macOS-Packages
        path: build-Release/djv-*.dmg
        archive: false

  windows-build:
    runs-on: windows-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: OFF
      TLRENDER_NASM: OFF
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: ilammy/setup-nasm@v1

    # \bug Any spaces before the ">>" will be considered part of the path.
    - name: Setup environment
      shell: cmd
      run: |
        echo %CD%\install-Debug\bin>> %GITHUB_PATH%
        echo %CD%\install-Debug\lib>> %GITHUB_PATH%
        echo CTEST_OUTPUT_ON_FAILURE=1 >> %GITHUB_ENV%
        cmake --version
        python --version
        
    - name: Super Build
      shell: cmd
      run: |
        djv\etc\Windows\windows-sbuild.bat djv Debug

    - name: Build DJV
      shell: cmd
      run: |
        djv\etc\Windows\windows-build.bat djv Debug

  windows-package:
    runs-on: windows-latest

    env:
      JOBS: 4
      TLRENDER_NET: OFF
      TLRENDER_OCIO: ON
      TLRENDER_JPEG: ON
      TLRENDER_TIFF: ON
      TLRENDER_EXR: ON
      TLRENDER_AOM: OFF
      TLRENDER_SVTAV1: OFF
      TLRENDER_FFMPEG: ON
      TLRENDER_FFMPEG_MINIMAL: ON
      TLRENDER_FFMPEG_PLUGIN: ON
      TLRENDER_FFMPEG_CMD: ON
      TLRENDER_NASM: OFF
      TLRENDER_OIIO: ON
      TLRENDER_USD: OFF
      FTK_API: GL_4_1
      BUILD_SHARED_LIBS: OFF

    steps:
    - uses: actions/checkout@v4
      with:
        path: djv
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: ilammy/setup-nasm@v1

    # \bug Any spaces before the ">>" will be considered part of the path.
    - name: Setup environment
      shell: cmd
      run: |
        echo %CD%\install-Release\bin>> %GITHUB_PATH%
        echo %CD%\install-Release\lib>> %GITHUB_PATH%
        echo CTEST_OUTPUT_ON_FAILURE=1 >> %GITHUB_ENV%
        cmake --version
        python --version
    - name: Super Build
      shell: cmd
      run: |
        djv\etc\Windows\windows-sbuild.bat djv Release

    - name: Build portable ZIP
      shell: cmd
      run: |
        djv\etc\Windows\windows-portable-package.bat djv Release

    - name: Build portable EXE
      shell: pwsh
      run: |
        $zip = Get-ChildItem -LiteralPath "build-Release" -Filter "djv-*-windows-*.zip" -File | Select-Object -First 1
        if (-not $zip) {
          Get-ChildItem -LiteralPath "build-Release" -Recurse | Select-Object FullName
          throw "Portable ZIP was not generated."
        }
        $zipPath = (Resolve-Path -LiteralPath $zip.FullName).Path
        $portableExePath = Join-Path "build-Release" "$($zip.BaseName)-portable.exe"
        Write-Host "Portable ZIP: $zipPath"
        Write-Host "Portable EXE: $portableExePath"
        & "djv\etc\Windows\windows-portable-sfx.ps1" -ZipPath $zipPath -OutputPath $portableExePath

    - name: Verify packaged local changes
      shell: pwsh
      run: |
        $zip = Get-ChildItem -LiteralPath "build-Release" -Filter "djv-*-windows-*.zip" -File | Select-Object -First 1
        if (-not $zip) {
          throw "Portable ZIP was not generated."
        }
        $verifyDir = Join-Path $env:RUNNER_TEMP "djv-package-verify"
        Remove-Item -Recurse -Force $verifyDir -ErrorAction SilentlyContinue
        Expand-Archive -Path $zip.FullName -DestinationPath $verifyDir -Force
        $exe = Get-ChildItem $verifyDir -Recurse -Filter "djv.exe" | Select-Object -First 1
        if (-not $exe) {
          throw "djv.exe was not found in the portable ZIP."
        }
        $text = [System.Text.Encoding]::UTF8.GetString([System.IO.File]::ReadAllBytes($exe.FullName))
        $requiredStrings = @(
          "未加载 A 视频",
          "打开 A 视频",
          "请选择 B 视频",
          "DJV_SMOKE_DUAL_TOTAL_EXIT"
        )
        foreach ($value in $requiredStrings) {
          if (-not $text.Contains($value)) {
            throw "Packaged djv.exe is missing expected local change marker: $value"
          }
        }
        Write-Host "Verified packaged local changes in $($exe.FullName)"

        $portableExe = Get-ChildItem -LiteralPath "build-Release" -Filter "djv-*-windows-*-portable.exe" -File | Select-Object -First 1
        if (-not $portableExe) {
          throw "Portable self-extracting EXE was not generated."
        }
        Write-Host "Verified portable self-extracting EXE exists: $($portableExe.FullName)"

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-Windows-Portable-ZIP-x64
        path: build-Release\djv-*-windows-*.zip
        archive: false

    - uses: actions/upload-artifact@v7
      with:
        name: DJV-Windows-Portable-EXE-x64
        path: build-Release\djv-*-windows-*-portable.exe
        archive: false
